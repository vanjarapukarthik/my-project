# Telehealth platform — Nginx (single EC2: static UI + reverse proxy to Node on 127.0.0.1:5000)
#
# Install:
#   sudo cp deploy/nginx-telehealth.conf /etc/nginx/sites-available/telehealth
#   sudo ln -sf /etc/nginx/sites-available/telehealth /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
# Edit paths below (root, server_name), then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Security group: only 22 (your IP), 80, 443 — do NOT expose 5000 publicly.

server {
    listen 80;
    server_name _;

    # Built Vite app (dist contents)
    root /home/ubuntu/telehealth_platform_full_production/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST + LiveKit routes under Express (/api/*, /health)
    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://127.0.0.1:5000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Socket.IO (video consultation signaling)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
}
